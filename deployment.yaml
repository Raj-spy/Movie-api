apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: movie-api
  template:
    metadata:
      labels:
        app: movie-api
    spec:
      containers:
        - name: movie-api
          image: rajspy/myapp:v2
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_HOST
              value: redis

          resources:        # ✅ FIXED
            requests:
              cpu: "100m"
              memory: 126Mi
            limits:         # ✅ lowercase
              cpu: "200m"
              memory: 256Mi