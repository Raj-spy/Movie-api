replicaCount: 2

image:
  repository: 257394469486.dkr.ecr.ap-south-1.amazonaws.com/movie-api
  tag: latest
  pullPolicy: IfNotPresent

# Ye section add karna ZAROORI hai
imagePullSecrets:
  - name: ecr-secret

service:
  type: NodePort
  port: 8000

ingress:
  host: movie.local

redis:
  host: redis
  port: 6379

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

readinessProbe:
   httpGet:
   path: /health
   port: 8000

livenessProbe:
    httpGet:
    path: /health
    port: 8000
