name: CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Build Docker Image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/movie-api:${{ github.sha }} .

      # Login to DockerHub
      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      # Push Image
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/movie-api:${{ github.sha }}

      # Print Image Tag (IMPORTANT)
      - name: Show Image Tag
        run: |
          echo "NEW IMAGE TAG: ${{ secrets.DOCKER_USERNAME }}/movie-api:${{ github.sha }}"

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/movie-api:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1    