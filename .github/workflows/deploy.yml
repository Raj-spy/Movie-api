name: CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Build Docker Image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/movie-api:${{ github.sha }} .

      # Login to DockerHub
      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      # Push Image
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/movie-api:${{ github.sha }}

      # Print Image Tag (IMPORTANT)
      - name: Show Image Tag
        run: |
          echo "NEW IMAGE TAG: ${{ secrets.DOCKER_USERNAME }}/movie-api:${{ github.sha }}"

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/movie-api:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1

      - name: Slack Success
        if: success()
        run: |
         curl -x POST -H 'Content-type: application/json' \
         --data '{"text":"Docker image ${{ secrets.DOCKER_USERNAME }}/movie-api:${{ github.sha }} built and pushed successfully!"}' \
         ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack Failure
        if: failure()
        run: |
         curl -x POST -H 'Content-type: application/json' \
         --data '{"text":"Failed to build or push Docker image ${{ secrets.DOCKER_USERNAME }}/movie-api:${{ github.sha }}."}' \
         ${{ secrets.SLACK_WEBHOOK_URL }}    